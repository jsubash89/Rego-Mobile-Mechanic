name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect optional npm scripts
        id: scripts
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { scripts = {} } = require('./package.json');
          console.log(`has_lint=${Boolean(scripts.lint)}`);
          console.log(`has_test=${Boolean(scripts.test)}`);
          NODE

      - name: Lint
        if: steps.scripts.outputs.has_lint == 'true'
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        if: steps.scripts.outputs.has_test == 'true'
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
